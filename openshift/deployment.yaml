apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntt-lvm
  labels:
    app: ntt-lvm
    app.kubernetes.io/name: ntt-lvm
    app.kubernetes.io/version: "0.1.9"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntt-lvm
  template:
    metadata:
      labels:
        app: ntt-lvm
        app.kubernetes.io/name: ntt-lvm
        app.kubernetes.io/version: "0.1.9"
    spec:
      containers:
        - name: ntt-lvm
          image: quay.io/fcalomen/ntt-lvm:0.1.9
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: APP_VERSION
              value: "0.1.9"
            - name: ANALYSIS_EXPORT_ENABLED
              value: "false"
            - name: ANALYSIS_EXPORT_PROVIDER
              value: ""
            - name: ANALYSIS_EXPORT_PREFIX
              value: analysis
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
